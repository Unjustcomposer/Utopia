apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusai-server
  labels:
    app: nexusai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexusai
  template:
    metadata:
      labels:
        app: nexusai
    spec:
      containers:
      - name: nexusai-server
        image: nexusai-server:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: nexusai-service
spec:
  selector:
    app: nexusai
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
